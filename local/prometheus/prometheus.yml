global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: compare-rest
    static_configs:
      - targets: ["rest-server:8081"]
        labels:
          service: rest

  - job_name: compare-grpc
    static_configs:
      - targets: ["grpc-server:8081"]
        labels:
          service: grpc

  - job_name: compare-graphql
    static_configs:
      - targets: ["graphql-server:8081"]
        labels:
          service: graphql
